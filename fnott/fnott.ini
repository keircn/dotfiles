[main]
anchor=top-right
stacking-order=top-down
min-width=300
max-width=450
edge-margin-vertical=20
edge-margin-horizontal=20
notification-margin=10
icon-theme=Adwaita
max-icon-size=48
default-timeout=5
max-timeout=5
selection-helper=fuzzel --dmenu
play-sound=aplay ${filename}
background=0f1419ff
border-color=59c2ffff
border-size=2
border-radius=8
padding-vertical=15
padding-horizontal=15

title-font=sans serif:size=10
title-color=5c6773ff
title-format=<i>%a %A</i>

summary-font=sans serif:weight=bold:size=12
summary-color=e6e1cfff
summary-format=<b>%s</b>\n

body-font=sans serif:size=11
body-color=e6e1cfff
body-format=%b

progress-color=b8cc52ff

[low]
background=0f1419ff
border-color=161b22ff
title-color=5c6773ff
summary-color=5c6773ff
body-color=5c6773ff

[normal]

[critical]
background=0f1419ff
border-color=ff7733ff
border-size=3
default-timeout=0
