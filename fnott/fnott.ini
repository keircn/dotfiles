[main]
anchor=top-right
stacking-order=top-down
min-width=300
max-width=450
edge-margin-vertical=20
edge-margin-horizontal=20
notification-margin=10
icon-theme=Adwaita
max-icon-size=48
default-timeout=5
max-timeout=5
selection-helper=fuzzel --dmenu
play-sound=aplay ${filename}
background=19191eff
border-color=685878ff
border-size=2
border-radius=8
padding-vertical=15
padding-horizontal=15

title-font=sans serif:size=10
title-color=a0a0b0ff
title-format=<i>%a %A</i>

summary-font=sans serif:weight=bold:size=12
summary-color=e3e3eaff
summary-format=<b>%s</b>\n

body-font=sans serif:size=11
body-color=e3e3eaff
body-format=%b

progress-color=c6a0f6ff

[low]
background=19191eff
border-color=23232aff
title-color=a0a0b0ff
summary-color=a0a0b0ff
body-color=a0a0b0ff

[normal]

[critical]
background=19191eff
border-color=ed8796ff
border-size=3
default-timeout=0
