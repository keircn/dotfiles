$mod = Super
$left = h
$down = j
$up = k
$right = l
$term = kitty
$menu = vicinae toggle
$browser = firefox

monitor = HDMI-A-1, 1920x1080@100, 0x0, 1, bitdepth, 8

env = XDG_CURRENT_DESKTOP, Hyprland
env = XDG_SESSION_DESKTOP, Hyprland
env = XDG_SESSION_TYPE, wayland

input {
    kb_layout = us
    kb_options = compose:ralt
    repeat_delay = 250
    repeat_rate = 35
    follow_mouse = 1
    float_switch_override_focus = 0
}

general {
    border_size = 2
    gaps_in = 6
    gaps_out = 2
    allow_tearing = true
    layout = dwindle
    col.active_border = rgb(685878)
    col.inactive_border = rgb(23232a)
}

decoration {
    rounding = 5
    active_opacity = 1.0
    inactive_opacity = 1.0

    blur {
        enabled = false
    }

    shadow {
        enabled = false
    }
}

animations {
    enabled = false
}

dwindle {
    preserve_split = true
    smart_resizing = true
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = 0
    vfr = false
}

binds {
    workspace_back_and_forth = true
}

plugin {
    hyprwinwrap {
        class = steam_app_3213850
        title =
        match_current_class = false
        match_initial_title = false

        pos_x = 0
        pos_y = 0
        size_x = 100
        size_y = 100

        adopt_existing = true
        start_interactive = false
        force_float = true
        pin = true
        auto_windowrules = false

        render_hidden = true
        render_interactive = true
        force_full_monitor = true
        force_fullscreen = false
        client_fullscreen = false
        interactive_above_layers = false

        focus_guard = true
        refocus_on_show = true
        refocus_on_hide = false
        notifications = false
    }
}

bind = $mod, i, exec, hyprctl dispatch hyprwinwrap:toggle

bind = $mod, t, exec, $term
bind = $mod, space, exec, $menu
bind = $mod, b, exec, $browser
bind = $mod, c, exec, clipman pick -t wofi -T=" -G"
bind = $mod, p, exec, hyprpicker -anbrql

bind = $mod, $left, movefocus, l
bind = $mod, $down, movefocus, d
bind = $mod, $up, movefocus, u
bind = $mod, $right, movefocus, r

bind = $mod SHIFT, $left, movewindow, l
bind = $mod SHIFT, $down, movewindow, d
bind = $mod SHIFT, $up, movewindow, u
bind = $mod SHIFT, $right, movewindow, r

bind = $mod, x, layoutmsg, preselect r
bind = $mod, v, layoutmsg, preselect d
bind = $mod, a, togglesplit
bind = $mod, s, togglegroup
bind = $mod, w, changegroupactive, f
bind = $mod SHIFT, a, lockactivegroup, toggle

bind = $mod, m, tagwindow, swap
bind = $mod SHIFT, m, swapwindow, tag:swap

bind = $mod, minus, movetoworkspacesilent, special:scratch
bind = $mod, equal, togglespecialworkspace, scratch

bind = $mod, r, submap, resize
submap = resize
bind = , $left, resizeactive, -10 0
bind = , $down, resizeactive, 0 10
bind = , $up, resizeactive, 0 -10
bind = , $right, resizeactive, 10 0
bind = SHIFT, $left, resizeactive, -50 0
bind = SHIFT, $down, resizeactive, 0 50
bind = SHIFT, $up, resizeactive, 0 -50
bind = SHIFT, $right, resizeactive, 50 0
bind = , Return, submap, reset
bind = , Escape, submap, reset
bind = , catchall, submap, reset
submap = reset

bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8

bind = $mod, q, killactive
bind = $mod SHIFT, c, exec, hyprctl reload
bind = $mod SHIFT, f, fullscreen
bind = $mod SHIFT, space, togglefloating

bind = , Print, exec, grabit
bindel = , XF86MonBrightnessUp, exec, brightnessctl set +10%
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 10%-
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_SINK@ 5%-
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_SINK@ toggle

bind = $mod SHIFT, s, exec, hyprlock
bind = $mod SHIFT, e, exit

bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

exec-once = uwsm app -- wl-paste -t text --watch clipman store --no-persist
exec-once = uwsm app -- solaar -w hide
exec-once = uwsm app -- fnott
exec-once = uwsm app -- hypridle
exec-once = uwsm app -- /usr/lib/hyprpolkitagent/hyprpolkitagent
exec-once = uwsm app -s b -- vicinae server

exec-once = hyprpm reload
exec-once = hyprctl setcursor BreezeX-RoséPine 24

windowrule = float on, match:class ^(chrome-nngceckbapebfimnlniiiahkandclblb-Default)$
windowrule = size 820 620, match:class ^(chrome-nngceckbapebfimnlniiiahkandclblb-Default)$
windowrule = center on, match:class ^(chrome-nngceckbapebfimnlniiiahkandclblb-Default)$
windowrule = float on, match:class ^(cr.fr.bionus.Grabber)$
windowrule = immediate on, match:content 3
