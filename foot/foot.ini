[main]
term=foot
font=CommitMono Nerd Font:size=10
pad=4x4 center-when-maximized-and-fullscreen
selection-target=both

[colors-dark]
background=0f1419
foreground=e6e1cf
regular0=161b22
regular1=ff7733
regular2=b8cc52
regular3=ffb454
regular4=59c2ff
regular5=f07178
regular6=39adb5
regular7=e6e1cf
bright0=5c6773
bright1=ff7733
bright2=b8cc52
bright3=ffb454
bright4=59c2ff
bright5=f07178
bright6=39adb5
bright7=ffffff
selection-foreground=0f1419
selection-background=e6e1cf

[url]
launch=xdg-open ${url}
label-letters=sadfjklewcmpgh

[mouse]
hide-when-typing=yes

[bell]
urgent=no
notify=no

[scrollback]
lines=10000
